<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Nuovo Secolo - Pizzeria al Taglio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
    }

    header {
      background: #c0392b;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 40px;
    }

    .hero {
      padding: 60px;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1601924638867-3ec2b8c6d6f6') center/cover;
    }

    .hero h2 {
      font-size: 35px;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .menu {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    footer {
      background: #000;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <h1>Nuovo Secolo</h1>
  <p>Pizzeria al Taglio - Rieti</p>
</header>

<div class="hero">
  <h2>La vera pizza al taglio</h2>
  <p>Qualità, tradizione e gusto</p>
</div>

<div class="section">
  <h2>Le nostre pizze</h2>
  <div class="menu">
    <div class="card">
      <h3>Margherita</h3>
      <p>Pomodoro, mozzarella</p>
    </div>
    <div class="card">
      <h3>Diavola</h3>
      <p>Salame piccante</p>
    </div>
    <div class="card">
      <h3>Vegetariana</h3>
      <p>Verdure fresche</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Dove siamo</h2>
  <p>Rieti, Italia</p>
</div>

<footer>
  <p>© 2026 Nuovo Secolo</p>
</footer>

</body>
</html>
